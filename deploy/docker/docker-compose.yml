services:
  librertc-node:
    image: ${LIBRERTC_NODE_IMAGE:-ghcr.io/svllvsxprod/librertc-node:latest}
    container_name: ${LIBRERTC_NODE_CONTAINER:-librertc-node}
    restart: unless-stopped
    ports:
      - "${LIBRERTC_NODE_HOST_BIND:-127.0.0.1}:${LIBRERTC_NODE_HOST_PORT:-18888}:8888"
    environment:
      OLCRTC_PATH: /usr/local/bin/olcrtc
      OLCRTC_MANAGER_ENV_FILE: /etc/librertc/panel.env
    volumes:
      - ${LIBRERTC_NODE_CONFIG_DIR:-./local}:/etc/librertc
      - librertc-node-data:/var/lib/librertc
      - librertc-node-logs:/var/log/librertc
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    privileged: true
    devices:
      - /dev/net/tun:/dev/net/tun
    security_opt:
      - no-new-privileges:false
    networks:
      - librertc-node

volumes:
  librertc-node-data:
    name: ${LIBRERTC_NODE_DATA_VOLUME:-librertc-node-data}
  librertc-node-logs:
    name: ${LIBRERTC_NODE_LOGS_VOLUME:-librertc-node-logs}

networks:
  librertc-node:
    name: ${LIBRERTC_NODE_NETWORK:-librertc-node}
    driver: bridge
